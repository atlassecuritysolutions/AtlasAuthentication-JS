<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta http-equiv="Content-Security-Policy"
          content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'" />
    <title>Atlas Authentication — Electron Example</title>
    <style>
        :root {
            --bg: #09111f;
            --panel: #0d1829;
            --line: rgba(255,255,255,0.08);
            --hi: #f1f5f9;
            --lo: #94a3b8;
            --faint: #64748b;
            --signal: #3b9fe0;
            --alert: #e7a0a0;
            --ok: #62cda0;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, sans-serif;
            background: var(--bg);
            color: var(--hi);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 24px;
        }
        .card {
            width: 100%;
            max-width: 460px;
            background: var(--panel);
            border: 1px solid var(--line);
            border-radius: 12px;
            padding: 28px;
        }
        .eyebrow {
            font-family: ui-monospace, 'SF Mono', monospace;
            font-size: 10px;
            letter-spacing: 0.09em;
            text-transform: uppercase;
            color: var(--faint);
        }
        h1 {
            margin: 4px 0 24px;
            font-size: 18px;
            font-weight: 600;
            letter-spacing: -0.015em;
        }
        label {
            display: block;
            font-size: 12px;
            color: var(--lo);
            margin-bottom: 6px;
        }
        input {
            width: 100%;
            background: var(--bg);
            border: 1px solid var(--line);
            border-radius: 8px;
            padding: 10px 12px;
            color: var(--hi);
            font-size: 13px;
            font-family: ui-monospace, 'SF Mono', monospace;
            outline: none;
            transition: border-color 120ms;
        }
        input:focus { border-color: var(--signal); }
        button {
            width: 100%;
            margin-top: 16px;
            background: var(--signal);
            border: none;
            border-radius: 8px;
            padding: 10px 12px;
            color: #04101f;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: background 120ms;
        }
        button:hover { background: #5cb4ff; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        .status {
            margin-top: 20px;
            padding: 12px 14px;
            border-radius: 8px;
            font-size: 12.5px;
            line-height: 1.5;
            border: 1px solid var(--line);
            display: none;
        }
        .status.ok    { border-color: rgba(98,205,160,0.35); background: rgba(98,205,160,0.06); color: var(--ok); }
        .status.err   { border-color: rgba(231,160,160,0.35); background: rgba(231,160,160,0.06); color: var(--alert); }
        .status[hidden] { display: none; }
        .meta {
            margin-top: 20px;
            border-top: 1px solid var(--line);
            padding-top: 16px;
            display: grid;
            grid-template-columns: max-content 1fr;
            gap: 8px 16px;
            font-size: 12.5px;
        }
        .meta dt { color: var(--faint); font-family: ui-monospace, monospace; font-size: 10.5px; text-transform: uppercase; letter-spacing: 0.06em; align-self: center; }
        .meta dd { margin: 0; color: var(--hi); font-family: ui-monospace, monospace; }
    </style>
</head>
<body>
    <div class="card">
        <div class="eyebrow">Authentication</div>
        <h1>Enter your Atlas license</h1>

        <form id="loginForm">
            <label for="license">License key</label>
            <input id="license" type="text" autocomplete="off" spellcheck="false" placeholder="ATLAS-XXXXX-XXXXX-XXXXX" />
            <button id="submit" type="submit">Sign in</button>
        </form>

        <div id="status" class="status"></div>

        <dl class="meta" id="meta" hidden>
            <dt>Level</dt><dd id="mLevel">—</dd>
            <dt>Expiry</dt><dd id="mExpiry">—</dd>
            <dt>Note</dt><dd id="mNote">—</dd>
        </dl>
    </div>

    <script>
        // The renderer NEVER touches the Atlas DLL. It only talks to the
        // main process through `window.atlas`, which preload.js exposed.
        const form   = document.getElementById('loginForm');
        const input  = document.getElementById('license');
        const submit = document.getElementById('submit');
        const status = document.getElementById('status');
        const meta   = document.getElementById('meta');

        function show(kind, text) {
            status.className = 'status ' + kind;
            status.textContent = text;
            status.style.display = 'block';
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const key = input.value.trim();
            if (!key) return;
            submit.disabled = true;
            show('', 'Connecting to Atlas…');
            const result = await window.atlas.login(key);
            if (result.ok) {
                show('ok', 'Authenticated.');
                meta.hidden = false;
                document.getElementById('mLevel').textContent = result.level || '—';
                document.getElementById('mExpiry').textContent = result.expiry || '—';
                document.getElementById('mNote').textContent = result.note || '—';
                input.disabled = true;
                submit.disabled = true;
            } else {
                show('err', result.error || 'Authentication failed.');
                submit.disabled = false;
            }
        });
    </script>
</body>
</html>
